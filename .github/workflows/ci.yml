name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  valid-fixture:
    uses: ./.github/workflows/unity-meta-check.yml
    with:
      path: tests/fixtures/valid-unity-project
      checker-ref: ${{ github.sha }}

  invalid-fixture:
    name: Reject invalid fixture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Invalid project should fail
        shell: bash
        run: |
          set +e
          python3 scripts/unity-meta-check.py --path tests/fixtures/invalid-unity-project > check-output.txt 2>&1
          status=$?
          set -e

          cat check-output.txt

          if [[ "$status" -eq 0 ]]; then
            echo "Expected invalid fixture to fail."
            exit 1
          fi

          grep -q "Missing meta file: Assets/Missing.txt.meta" check-output.txt
          grep -q "Orphan meta file: Assets/Orphan.txt.meta" check-output.txt
