name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  valid-fixture:
    uses: ./.github/workflows/unity-meta-check.yml
    with:
      path: tests/fixtures/valid-unity-project
      checker-ref: ${{ github.sha }}

  invalid-fixtures:
    name: Reject invalid fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Invalid fixtures should fail
        shell: bash
        run: bash tests/run-negative-tests.sh
